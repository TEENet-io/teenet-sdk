<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passkey Approval React Demo</title>
  <style>
    :root { --bg:#f5f8ff; --card:#fff; --line:#dbe5f7; --text:#14233d; --muted:#5a7096; --accent:#1f6fff; --ok:#0f9960; --err:#c83e4d; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background: radial-gradient(circle at 5% 5%, #d8e7ff, transparent 35%), var(--bg); color:var(--text); }
    .wrap { max-width: 1180px; margin: 24px auto; padding: 0 14px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(320px,1fr)); gap:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; }
    h1 { margin:0 0 4px; }
    h2 { margin:0 0 8px; font-size:15px; }
    label { display:block; font-size:12px; color:var(--muted); margin:8px 0 4px; }
    input,textarea,button { width:100%; border-radius:10px; font-size:14px; }
    input,textarea { border:1px solid var(--line); padding:9px 10px; }
    textarea { min-height: 86px; resize: vertical; font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    button { border:none; color:#fff; background:var(--accent); padding:10px; margin-top:8px; cursor:pointer; }
    .hint { color:var(--muted); font-size:12px; margin:6px 0 0; }
    .msg { min-height:18px; font-size:12px; margin-top:6px; }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--err); }
    .list { display:grid; gap:8px; max-height:240px; overflow:auto; margin-top:8px; }
    .item { border:1px solid var(--line); border-radius:10px; padding:9px; font-size:12px; background:#fafcff; cursor:pointer; }
    pre { margin:0; padding:10px; border-radius:10px; background:#0f172a; color:#d8e4ff; font-size:12px; white-space:pre-wrap; word-break:break-word; max-height:260px; overflow:auto; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/react-app.js"></script>
</body>
</html>
